<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Group 10 | Construction Connection Platform</title>
</head>
<body>

    <header>
        <nav>
            <div class="logo">Construction<span>Hub</span></div>
            <ul>
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#materials">Materials</a></li>
                <li><a href="index.html#suppliers">Suppliers</a></li>
                <li><a href="index.html#contact">Contact Us</a></li>
            </ul>
            <button class="cta-btn">Register as Supplier</button>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1 style="color:rgb(114,12,12)">Join ConstructionHub</h1>
            <p>Register to access materials, suppliers, and exclusive deals.</p>
            
            <form class="register-form" action="index.html">
                <label for="name"> Name *</label><br>
                <input type="text" name="name" placeholder="Full Name" required><br>
                <label for="phone"> Phone number *</label><br>
                <input type="tel" name="phone" placeholder="Phone Number" required><br>
                <label for="email"> Email *</label><br>
                <input type="email" name="email" placeholder="Email Address" required><br>
                <label for="password">Password *</label><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <button type="submit" class="submit-btn">Register Now</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Group 10 Project - Construction Materials and Products Connection Platform.</p>
    </footer>


</body>
</html>
